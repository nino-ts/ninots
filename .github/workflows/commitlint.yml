name: Lint commits

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Validate latest commit (push)
        if: github.event_name == 'push'
        run: bunx -p @commitlint/cli commitlint --last --verbose

      - name: Validate pull request commits
        if: github.event_name == 'pull_request'
        run: bunx -p @commitlint/cli commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose
